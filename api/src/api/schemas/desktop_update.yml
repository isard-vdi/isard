id:
  type: string
  empty: false
  coerce: sanitize
name:
  maxlength: 50
  type: string
  coerce: sanitize
description:
  maxlength: 255
  type: string
  coerce: sanitize
hardware:
  schema: hardware_update
guest_properties:
  type: dict
  schema: guest_properties_update
image:
  schema: image_update
server:
  type: boolean
forced_hyp:
  type:
    - boolean
    - list
  coerce: sanitize
favourite_hyp:
  type:
    - boolean
    - list
  coerce: sanitize
xml:
  type: string
ids:
  type: list
  schema:
    type: string
    coerce: sanitize
server_autostart:
  type: boolean
xml_protected_sections:
  type: list
  schema:
    type: string
    allowed:
      - memory
      - vcpus
      - cpu
      - boot_order
      - features
      - clock
      - pm
      - disks
      - isos
      - floppies
      - disk_cache
      - qos_disk
      - video
      - graphics
      - network
      - controllers
      - input
      - console
      - sound
      - channels
      - redirdev
      - rng
      - memballoon
      - hostdev
      - filesystem
      - domain_type
      - qemu_guest_agent
      - shared_folder