domain:
  type: dict
  schema:
    enabled:
      type: boolean
      required: true
      empty: false
      check_with: depends_if
      meta:
        depends_if:
          values:
            - true
          other_fields:
            - certificate_source
            - name
    name:
      type: string
      maxlength: 255
      empty: false
      regex: "^[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?(\\.[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]?)*$"
    certificate_source:
      type: string
      allowed:
        - acme
        - custom
      check_with: depends_if
      meta:
        depends_if:
          values:
            - custom
          other_fields:
            - certificate_data
    certificate_data:
      type: string
logo:
  type: dict
  schema:
    enabled:
      type: boolean
      required: true
      empty: false
      check_with: depends_if
      meta:
        depends_if:
          values:
            - true
          other_fields:
            - data
    data:
      type: string
      regex: "^(<\\?xml[^?]*\\?>\\s*)?(<![Dd][Oo][Cc][Tt][Yy][Pp][Ee]\\s[\\s\\S]*?>[\\s\\n\\r]*)?<svg[\\s\\S]*<\\/svg[\\s\\S]*>$"
      maxlength: 1048576
