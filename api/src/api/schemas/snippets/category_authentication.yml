local:
  type: dict
  schema:
    disabled:
      type: boolean
      required: true
      check_with: depends_if
      meta:
        depends_if:
          values:
            - false
          other_fields:
            - email_domain_restriction
    email_domain_restriction:
      type: dict
      schema: email_domain_restriction
