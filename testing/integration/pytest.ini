[pytest]
testpaths = .
markers =
    real: hits a live IsardVDI stack on the compose network; needs APIV4_URL/AUTH_URL/SOCKETIO_URL
    slow: takes over 60 seconds; opt-in with -m slow
    audit: probes every in-scope apiv4 endpoint with a realistic payload; opt-in with -m audit
addopts = -p no:cacheprovider -ra --strict-markers
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)-7s %(name)s | %(message)s
