[project]
name = "isardvdi-hypervisor"
version = "0.0.0"
requires-python = ">=3.13,<3.14"
dependencies = [
  "isardvdi-apiv4-client",
  "pyjwt==2.13.0",
  "pythonping==1.0.15",
  "requests==2.32.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.isardvdi.system-deps]
apk-build = ["build-base", "cargo", "git", "libffi-dev", "make", "musl-dev", "openssl-dev", "py3-docutils", "python3-dev", "uuidgen"]
apk-runtime = ["alsa-lib", "augeas-libs", "bash", "bridge-utils", "cairo", "cdparanoia-libs", "coreutils", "curl", "dbus", "eudev", "eudev-libs", "fontconfig", "freetype", "fribidi", "gcompat", "graphite2", "gst-plugins-base", "gstreamer", "harfbuzz", "iproute2", "libcap", "libcrypto3", "libdrm", "libepoxy", "libffi", "libgcrypt", "libgpg-error", "libjpeg-turbo", "libogg", "libpcap", "libpciaccess", "libpng", "libseccomp", "libtheora", "libusb", "libvirt", "libvirt-common-drivers", "libvirt-daemon", "libvirt-qemu", "libvorbis", "libx11", "libxau", "libxcb", "libxdamage", "libxdmcp", "libxext", "libxfixes", "libxft", "libxkbcommon", "libxml2-utils", "libxrender", "libxshmfence", "libxslt", "libxv", "libxxf86vm", "lz4-libs", "lzo", "mesa", "mesa-egl", "mesa-gbm", "mesa-gl", "netcf-libs", "openssh", "openssl", "openvswitch@community", "opus", "orc", "ovmf", "pango", "pciutils", "pixman", "polkit", "qemu", "qemu-img", "qemu-modules", "qemu-system-x86_64", "rsync", "shadow", "snappy", "speedtest-cli", "spice-server", "swtpm", "tshark", "usbredir", "virglrenderer", "virtiofsd", "wayland-libs-client", "wayland-libs-egl", "wayland-libs-server", "wireguard-tools"]
