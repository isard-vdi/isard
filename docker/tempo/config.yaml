stream_over_http_enabled: true
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        # Tempo >= 2.6 bundles an OTel Collector receiver whose default bind
        # address changed from 0.0.0.0 to localhost. Pin 0.0.0.0 explicitly so
        # other containers can still ship traces to isard-tempo:4317/4318.
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

metrics_generator:
  registry:
    external_labels:
      source: tempo
      domain: "${DOMAIN}"
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: "${VICTORIAMETRICS_ADDRESS}/api/v1/write"
        send_exemplars: true

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks

overrides:
  metrics_generator_processors: [service-graphs, span-metrics, local-blocks]
