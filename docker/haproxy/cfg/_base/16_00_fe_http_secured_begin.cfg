### START 16_00_fe_http_secured_begin.cfg ###
frontend fe_http_secured from  http_defaults
  filter compression
  bind 127.0.0.1:8082 accept-proxy

  http-request capture req.payload(0,100) len 100

  acl is_development var(proc.usage) -m str devel

  # Disable WebSocket logging
  acl is_upgrade hdr(Connection) -i upgrade
  acl is_websocket hdr(Upgrade) -i websocket
  http-request set-log-level silent if is_upgrade is_websocket

  # Bad paths — block dot-prefixed paths (e.g. /.git, /.env) which are
  # typically attempts to read sensitive metadata. With USAGE=devel, allow
  # `/.vite/` so Vite's pre-bundled deps (e.g. `/.vite/deps/vue.js`) can be
  # served to the Vue 3 dev frontend.
  acl is_bad_path path_beg -i /.
  acl is_vite_dep_path path_beg -i /.vite/
  http-request set-var(txn.block) str("BAD PATH") if is_bad_path !is_development
  http-request reject if is_bad_path !is_development
  http-request set-var(txn.block) str("BAD PATH") if is_bad_path is_development !is_vite_dep_path
  http-request reject if is_bad_path is_development !is_vite_dep_path

  # Capture request path for use in http-response context
  http-request set-var(txn.path) path

  # Tell upstream FastAPI/Flask services this came in over HTTPS so any
  # 30x redirects they issue (e.g. FastAPI's trailing-slash 307) build a
  # https:// Location header. Without this header uvicorn --proxy-headers
  # falls back to the inbound (HTTP) scheme, downgrading the redirect.
  http-request set-header X-Forwarded-Proto https

  # Security Headers
  #https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html
  http-response del-header X-Powered-By
  http-response del-header Server
  http-response set-header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
  http-response add-header X-Frame-Options DENY if !is_development
  http-response add-header X-XSS-Protection 0
  # CSP Headers (skip in development, strict for Vue3 production, relaxed for legacy webapp and noVNC viewer)
  acl is_legacy_webapp var(txn.path) -m beg /isard-admin
  acl is_viewer var(txn.path) -m beg /viewer
  acl is_monitor var(txn.path) -m beg /monitor
  http-response set-header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:" if !is_development is_legacy_webapp
  http-response set-header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:" if !is_development is_viewer
  http-response set-header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:; font-src 'self'" if !is_development is_monitor
  http-response set-header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:" if !is_development !is_legacy_webapp !is_viewer !is_monitor
  http-response add-header Referrer-Policy no-referrer
  http-response add-header X-Content-Type-Options nosniff

  # BEGIN CORS
  http-response set-header Access-Control-Allow-Origin "${CORS}"
  http-response set-header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization"
  http-response set-header Access-Control-Max-Age 3628800
  http-response set-header Access-Control-Allow-Methods "GET, POST, PUT, DELETE"
  # END CORS
### END 16_00_fe_http_secured_begin.cfg ###
