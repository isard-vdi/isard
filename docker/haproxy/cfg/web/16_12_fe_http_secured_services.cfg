  ### START 16_12_fe_secured_end.cfg ###
  acl is_upgrade hdr(Connection) -i upgrade
  acl is_websocket hdr(Upgrade) -i websocket
  acl is_guacamole_ws path_beg /websocket-tunnel
  acl is_guacamole_http path_beg /tunnel
  acl is_frontend_path path_beg /login or path_beg /migration or path_beg /register or path_beg /maintenance or path_beg /notifications or path_beg /verify-email or path_beg /vw or path_beg /frontend or path_beg /forgot-password
  # Vite dev-server serves JS modules at unprefixed paths (`/src/...`,
  # `/@vite/`, `/@id/`, `/@fs/`, `/node_modules/`, `/.vite/`) regardless of
  # `base: '/frontend'`. In dev mode the Vue 3 SPA shell <script src> tags
  # are emitted as `/src/main.ts` etc., so those paths must be routed to
  # `be_isard-frontend-dev` (otherwise they fall through to the Vue 2
  # webpack-dev-server which returns its own SPA fallback HTML and the
  # browser fails the module import).
  acl is_frontend_dev_asset path_beg /src/ or path_beg /@vite/ or path_beg /@id/ or path_beg /@fs/ or path_beg /node_modules/ or path_beg /.vite/

  http-request set-log-level silent if is_websocket

  # GUACAMOLE ENDPOINTS
  use_backend be_isard-guacamole if is_websocket is_guacamole_ws
  use_backend be_isard-guacamole if is_guacamole_http

  # AUTHENTICATION ENDPOINTS
  use_backend be_isard-authentication if { path_beg /authentication }

  # API ENDPOINTS
  # All API traffic → isard-apiv4 (FastAPI)
  use_backend be_isard-apiv4 if { path_beg /api/v4 }

  # SocketIO: standalone socketio service
  use_backend be_isard-socketio if { path_beg /socket.io }

  # WEBAPP ENDPOINTS
  use_backend be_isard-webapp if { path_beg /isard-admin } or { path_beg /isard-admin/ }

  # SCHEDULER ENDPOINTS
  use_backend be_isard-scheduler if { path_beg /scheduler }

  # ENGINE ENDPOINTS
  use_backend be_isard-engine if { path_beg /engine }

  # NOTE: viewer websockets (be_isard-websockify) are routed by the *video*
  # flavour fragment (video/16_13_fe_http_secured_viewers.cfg), which is the
  # same flavour that defines the be_isard-websockify backend. Do NOT route it
  # from here: this fragment ships in the `web` flavour, which has no
  # be_isard-websockify backend, so a use_backend here makes haproxy refuse to
  # start on any web-only / web+monitor / web+storage deployment.

  # debug backends — gated on USAGE=devel so production deployments
  # don't expose the RethinkDB admin GUI. Pairs with the matching
  # ``backend be_isard-db`` block in 20_be_web.cfg and the
  # ``USAGE: ${USAGE:-production}`` env passthrough in
  # docker-compose-parts/haproxy.yml.
.if streq("$USAGE","devel")
  use_backend be_isard-db if { path_beg /debug/db }
.endif
  # use_backend be_isard-video if { path_beg /debug/video }

  # NOTE: /monitor (be_isard-grafana) and /prometheus (be_isard-prometheus) are
  # routed by the *monitor* flavour fragment (monitor/16_11_fe_http_secured_end.cfg),
  # which is the same flavour that defines those backends. Routing them from this
  # `web` fragment makes haproxy refuse to start on any web deployment without the
  # monitor flavour (web, web+storage, web+storage+video).

  # NEXTCLOUD ENDPOINTS
  use_backend be_isard-nc if { path_beg /isard-nc }

  # Openapi endpoint
  use_backend be_isard-openapi if { path_beg /openapi } or { path_beg /openapi/ }

  # FARO RECEIVER ENDPOINT
  use_backend be_isard-grafana-alloy-faro if { path_beg /faro } { env(FARO_ENABLED) -m str true }

  # develop backends
  # This must be the last use_backend directive
  use_backend be_isard-static if { env(DEVELOPMENT) -m str true } { path_beg /assets/ }
  use_backend be_isard-frontend-dev if { env(DEVELOPMENT) -m str true } is_frontend_path
  use_backend be_isard-frontend-dev if { env(DEVELOPMENT) -m str true } is_frontend_dev_asset
  use_backend be_isard-old-frontend-dev if { env(DEVELOPMENT) -m str true } !{ path_beg /viewer/ }

  default_backend         be_isard-static
  ### END 16_12_fe_secured_end.cfg ###
