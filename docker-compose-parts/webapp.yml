services:
  isard-webapp:
    container_name: isard-webapp
    image: ${DOCKER_IMAGE_PREFIX}webapp:${DOCKER_IMAGE_TAG:-latest}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    networks:
      isard-network:
        ipv4_address: ${DOCKER_NET:-172.31.255}.26
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      USAGE: ${USAGE:-production}
      DOMAIN:
      API_ISARDVDI_SECRET:
      LOG_LEVEL:
      GRAFANA_WEBAPP_URL:
      OPERATIONS_API_ENABLED:
      FARO_ENABLED:
      FARO_URL:
      # webapp's per-request rdb pattern doesn't currently use the
      # shared pool; flagged for migration in
      # RETHINKDB_DRIVER_ADAPTATION.md (Tier 3). Once migrated, the
      # pool size will apply. Set defensively now so the eventual
      # migration inherits a sensible default.
      RETHINKDB_POOL_SIZE: ${RETHINKDB_POOL_SIZE:-5}
      RETHINKDB_SLOW_QUERY_MS: ${RETHINKDB_SLOW_QUERY_MS:-500}
