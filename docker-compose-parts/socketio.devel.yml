services:
  isard-socketio:
    # watchfiles is now a regular dep of isardvdi-socketio so uvicorn
    # picks it up automatically for --reload (inotify-based) instead of
    # falling back to StatReload polling, which hangs across the
    # bind-mounted /opt/isardvdi/isardvdi_common tree.
    # Both /opt/isardvdi/isardvdi_socketio AND /opt/isardvdi/isardvdi_common
    # are separate bind mounts. inotify on the parent /opt/isardvdi does NOT
    # recurse through sub-mounts, so each one must be listed explicitly or
    # changes to _common get silently dropped.
    command: ["uvicorn", "isardvdi_socketio:app", "--host", "0.0.0.0", "--port", "5000", "--reload", "--reload-dir", "/opt/isardvdi/isardvdi_socketio", "--reload-dir", "/opt/isardvdi/isardvdi_common", "--proxy-headers", "--forwarded-allow-ips=*"]
    environment:
      PYTHONPATH: /opt/isardvdi
    volumes:
      - ${BUILD_ROOT_PATH}/component/socketio/src:/opt/isardvdi/isardvdi_socketio
      - ${BUILD_ROOT_PATH}/component/_common/src/isardvdi_common:/opt/isardvdi/isardvdi_common
