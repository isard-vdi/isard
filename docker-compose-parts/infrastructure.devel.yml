services:
  isard-orchestrator:
    image: ${GOLANG_BUILD_IMAGE:-golang:1.25.8-alpine3.22@sha256:6b7607461f105ccaa0615b6f7932dfd5b36c5d827a0770b5578e565107cc3adb}
    build: !reset null
    command:
      - ash
      - -c
      - >-

        go tool -modfile=/tools/go.mod CompileDaemon \
          -log-prefix=false \
          -graceful-kill=true \
          -directory=/orchestrator \
          -build="go build -o /bin/orchestrator ./orchestrator/cmd/orchestrator/main.go" \
          -command="go tool -modfile=/tools/go.mod dlv exec --headless=true --listen=:4000 --api-version=2 --accept-multiclient --continue /bin/orchestrator"
    volumes:
      - ${BUILD_ROOT_PATH}/go.mod:/orchestrator/go.mod
      - ${BUILD_ROOT_PATH}/go.sum:/orchestrator/go.sum
      - ${BUILD_ROOT_PATH}/pkg:/orchestrator/pkg
      - ${BUILD_ROOT_PATH}/orchestrator:/orchestrator/orchestrator
      - ${BUILD_ROOT_PATH}/tools:/tools
      - ${XDG_CACHE_HOME:-$HOME/.cache}/isardvdi/go-devel/cache:/root/.cache/go-build
      - ${XDG_CACHE_HOME:-$HOME/.cache}/isardvdi/go-devel/pkg:/go/pkg
    security_opt:
      - "seccomp:unconfined"
    cap_add:
      - SYS_PTRACE
