services:
  isard-grafana:
    container_name: isard-grafana
    image: ${DOCKER_IMAGE_PREFIX}grafana:${DOCKER_IMAGE_TAG-latest}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    networks:
      isard-network:
        ipv4_address: ${DOCKER_NET:-172.31.255}.15
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /opt/isard/monitor/grafana/data:/var/lib/grafana
      - /opt/isard/monitor/grafana/custom:/custom
    restart: unless-stopped
    environment:
      DOMAIN:
      WEBAPP_ADMIN_PWD:
      API_ISARDVDI_SECRET: "${API_ISARDVDI_SECRET}"
      VICTORIAMETRICS_ADDRESS: "${VICTORIAMETRICS_ADDRESS:-${PROMETHEUS_ADDRESS:-http://isard-victoriametrics:8428}}"
      LOKI_ADDRESS: "${LOKI_ADDRESS:-http://isard-loki:3100}"
      # This plugin is bundled with grafana, but needs to be activated separately
      GF_INSTALL_PLUGINS: "grafana-pyroscope-app"
      PYROSCOPE_ADDRESS: "${PYROSCOPE_ADDRESS:-http://isard-pyroscope:4040}"
      TEMPO_ADDRESS: "${TEMPO_ADDRESS:-http://isard-tempo:3200}"
      GRAFANA_TELEGRAM_CHAT_ID: "${GRAFANA_TELEGRAM_CHAT_ID}"
      GRAFANA_TELEGRAM_TOKEN: "${GRAFANA_TELEGRAM_TOKEN}"

  isard-victoriametrics:
    container_name: isard-victoriametrics
    image: victoriametrics/victoria-metrics:v1.147.0
    user: root
    volumes:
      - /opt/isard/stats/victoriametrics:/victoria-metrics-data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    networks:
      isard-network:
        ipv4_address: ${DOCKER_NET:-172.31.255}.68
    restart: unless-stopped
    command: >-
      -storageDataPath=/victoria-metrics-data
      -retentionPeriod=${VICTORIAMETRICS_RETENTION_TIME:-${PROMETHEUS_RETENTION_TIME:-40d}}
      -selfScrapeInterval=30s

  isard-loki:
    container_name: isard-loki
    image: grafana/loki:3.7.3
    user: root
    volumes:
      - /opt/isard/stats/loki:/data
      - ${BUILD_ROOT_PATH}/docker/loki/config.yaml:/etc/loki/local-config.yaml
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    networks:
      isard-network:
        ipv4_address: ${DOCKER_NET:-172.31.255}.67
    restart: unless-stopped
    command: --config.file=/etc/loki/local-config.yaml --store.retention=${LOKI_RETENTION_TIME:-40d}
