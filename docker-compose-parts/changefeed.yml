services:
  isard-changefeed:
    image: ${DOCKER_IMAGE_PREFIX}changefeed:${DOCKER_IMAGE_TAG:-latest}
    container_name: isard-changefeed
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    networks:
      isard-network:
        ipv4_address: ${DOCKER_NET:-172.31.255}.32
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      LOG_LEVEL:
      PYTHONUNBUFFERED: 1
      RETHINKDB_HOST: ${RETHINKDB_HOST:-isard-db}
      RETHINKDB_PORT: ${RETHINKDB_PORT:-28015}
      RETHINKDB_DB: ${RETHINKDB_DB:-isard}
      REDIS_HOST:
      REDIS_PORT:
      REDIS_PASSWORD:
