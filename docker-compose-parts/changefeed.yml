services:
  isard-changefeed:
    image: ${DOCKER_IMAGE_PREFIX}changefeed:${DOCKER_IMAGE_TAG:-latest}
    container_name: isard-changefeed
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    networks:
      isard-network:
        ipv4_address: ${DOCKER_NET:-172.31.255}.32
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      LOG_LEVEL:
      PYTHONUNBUFFERED: 1
      RETHINKDB_HOST: ${RETHINKDB_HOST:-isard-db}
      RETHINKDB_PORT: ${RETHINKDB_PORT:-28015}
      RETHINKDB_DB: ${RETHINKDB_DB:-isard}
      # changefeed's long-lived multi-table cursor uses a dedicated
      # asyncio-native connection from `_common`'s
      # ``rethink_dedicated_async_connection`` helper (P2 #10,
      # 2026-05-02) — ``async for change in cursor:`` yields the
      # event loop on every recv, no worker-thread / queue plumbing
      # needed. The shared pool only handles short-lived setup /
      # catch-up reads (``_wait_for_tables`` readiness gate), so 4
      # slots is plenty.
      RETHINKDB_POOL_SIZE: ${RETHINKDB_POOL_SIZE:-4}
      RETHINKDB_SLOW_QUERY_MS: ${RETHINKDB_SLOW_QUERY_MS:-500}
      REDIS_HOST:
      REDIS_PORT:
      REDIS_PASSWORD:
