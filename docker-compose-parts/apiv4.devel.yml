services:
  isard-apiv4:
    container_name: isard-apiv4
    #image: isard/webapp:${TAG:-latest}
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "5000", "--reload", "--reload-dir", "api", "--reload-dir", "/opt/isardvdi/isardvdi_common"]
    volumes:
      - ${BUILD_ROOT_PATH}/component/apiv4/src:/app
      - ${BUILD_ROOT_PATH}/component/_common/isardvdi_common:/opt/isardvdi/isardvdi_common
      # - ${BUILD_ROOT_PATH}/pkg/gen/proto/python:/opt/isardvdi/isardvdi_protobuf
      # - ${BUILD_ROOT_PATH}/pkg/gen/proto/python_old:/opt/isardvdi/isardvdi_protobuf_old
