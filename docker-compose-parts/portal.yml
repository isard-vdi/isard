services:
  isard-portal:
    container_name: isard-portal
    image: ${DOCKER_IMAGE_PREFIX}portal:${DOCKER_IMAGE_TAG-latest}
    restart: unless-stopped
    # tini as PID 1 so haproxy's exit-on-failure SIGTERM is not ignored by the kernel
    init: true
    healthcheck:
      test: ["CMD-SHELL", "echo 'show info' | socat -T2 - UNIX-CONNECT:/var/run/haproxy.sock | grep -q '^Process_num' || exit 1"]
      start_period: 60s
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    networks:
      isard-network:
        ipv4_address: ${DOCKER_NET:-172.31.255}.18
    ports:
      - published: ${HTTP_PORT:-80}
        target: ${HTTP_PORT:-80}
        mode: host
      - published: ${HTTPS_PORT:-443}
        target: ${HTTPS_PORT:-443}
        mode: host
    volumes:
      - /opt/isard/certs/acme:/etc/acme:rw
      - /opt/isard/certs/default:/certs:rw
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /opt/isard-local/ipsec-fw/lists:/usr/local/etc/haproxy/lists
      - /opt/isard-local/haproxy/cfg:/usr/local/etc/haproxy/cfg/customs
      - /opt/isard-local/haproxy/spoe:/usr/local/etc/haproxy/spoe
    environment:
      FLAVOUR: ${FLAVOUR:-all-in-one}
      FORBID_DOMAIN_IP: ${FORBID_DOMAIN_IP:-false}
      CORS: ${CORS:-*}
      BASTION_ENABLED: ${BASTION_ENABLED:-false}
      BASTION_SSH_PORT: ${BASTION_SSH_PORT:-${HTTPS_PORT:-443}}
    env_file:
      - .env
