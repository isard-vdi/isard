services:
  isard-static:
    volumes:
    - ${BUILD_ROOT_PATH}/docker/static/spice-web-client:/usr/share/nginx/html/static/spice-web-client
    - ${BUILD_ROOT_PATH}/docker/static/noVNC:/usr/share/nginx/html/static/noVNC
    - ${BUILD_ROOT_PATH}/docker/static/default.conf:/etc/nginx/conf.d/default.conf

  isard-frontend-dev:
    container_name: isard-frontend-dev
    image: oven/bun:1.3-alpine
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      isard-network:
    working_dir: /usr/local/src/isard-frontend-dev/
    command: sh -c "bun install && (bun run storybook --no-open & bun run dev --host)"
    ports:
      - "${INFRASTRUCTURE_HOST_IP:-0.0.0.0}:6006:6006"
      - "${INFRASTRUCTURE_HOST_IP:-0.0.0.0}:5173:5173"
    volumes:
    - ${BUILD_ROOT_PATH}/component/frontend/:/usr/local/src/isard-frontend-dev/

  isard-old-frontend-dev:
    container_name: isard-old-frontend-dev
    image: oven/bun:1.3-alpine
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      isard-network:
    working_dir: /usr/local/src/isard-old-frontend/
    environment:
      CYPRESS_CACHE_FOLDER: /usr/local/src/isard-old-frontend/node_modules/.cache/cypress
      WDS_PUBLIC: "https://${DOMAIN:-localhost}:${HTTPS_PORT:-443}"
    command: sh -c "bun install && bun run serve"
    volumes:
    - ${BUILD_ROOT_PATH}/old-frontend/:/usr/local/src/isard-old-frontend/
