services:
  isard-vpn:
    container_name: isard-vpn
    image: ${DOCKER_IMAGE_PREFIX}vpn:${DOCKER_IMAGE_TAG:-latest}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      isard-network:
        ipv4_address: ${DOCKER_NET:-172.31.255}.23
    ports:
      - published: ${WG_USERS_PORT:-443}
        target: ${WG_USERS_PORT:-443}
        protocol: udp
      - published: ${WG_HYPERS_PORT:-4443}
        target: ${WG_HYPERS_PORT:-4443}
        protocol: udp
    privileged: true
    volumes:
      - /sys:/sys:rw
      - /opt/isard/wireguard/certs:/certs
      - /opt/isard/certs/default:/portal-certs:ro
      - /opt/isard/dnsmasq:/var/lib/misc
      - /opt/isard/dnsmasq/static_leases:/var/lib/static_leases
      - /opt/isard-local/conntrack:/conntrack
      - /proc/sys/net/netfilter/nf_conntrack_acct:/host-proc/sys/net/netfilter/nf_conntrack_acct
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      # OVS Security Configuration (automatic based on API_DOMAIN)
      API_DOMAIN: ${API_DOMAIN:-}
      DOCKER_NET: ${DOCKER_NET:-172.31.255}
      WG_GUESTS_NETS: ${WG_GUESTS_NETS:-10.2.0.0/16}
      WG_GUESTS_RESERVED_HOSTS: ${WG_GUESTS_RESERVED_HOSTS:-20}
      WG_MAIN_NET: ${WG_MAIN_NET:-10.0.0.0/14}
      WG_USERS_NET: ${WG_USERS_NET:-10.0.0.0/16}
      WG_HYPERS_NET: ${WG_HYPERS_NET:-10.1.0.0/24}
      INFRASTRUCTURE_MTU: ${INFRASTRUCTURE_MTU:-1500}
      GENEVE_ONLY_INFRA: ${GENEVE_ONLY_INFRA:-false}
