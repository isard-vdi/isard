# docker-compose.ci.yml — Local CI pipeline
#
# Replicates the GitLab CI jobs as compose services grouped by profile.
# All output is saved to ci-results/<service>.log (gitignored).
#
# Usage:
#   docker compose -f docker-compose.ci.yml --profile lint up --abort-on-container-exit
#   docker compose -f docker-compose.ci.yml --profile unit-test up --abort-on-container-exit
#   docker compose -f docker-compose.ci.yml --profile generate up --abort-on-container-exit
#   docker compose -f docker-compose.ci.yml --profile build up --abort-on-container-exit
#   docker compose -f docker-compose.ci.yml --profile scan up --abort-on-container-exit
#   docker compose -f docker-compose.ci.yml --profile fix up        # auto-fix linting issues
#   docker compose -f docker-compose.ci.yml run --rm check-python   # single job
#
# Git hooks:
#   git config core.hooksPath .githooks
#
# Required env vars for build profile:
#   CI_REGISTRY_IMAGE

x-source: &source
  - .:/build
  - ./ci-results:/ci-results

services:
  # ── lint ────────────────────────────────────────────────────────────

  commit-lint:
    image: node:lts
    profiles: [lint]
    working_dir: /build
    volumes: *source
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        git config --global --add safe.directory /build
        { npm install -g commitlint@19.2.2 @commitlint/config-conventional@19.2.2 &&
        git fetch origin main &&
        commitlint --from=$$(git merge-base HEAD origin/main)
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/commit-lint.log
        exit $$(cat /tmp/.ec)

  check-python:
    image: python:3.10-bullseye
    profiles: [lint]
    working_dir: /build
    volumes: *source
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { pip install isort==5.13.2 black==24.3.0 &&
        isort --check . &&
        black --check .
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/check-python.log
        exit $$(cat /tmp/.ec)

  check-vue3-format:
    image: oven/bun:1.3-alpine
    profiles: [lint]
    working_dir: /build/component/frontend
    volumes: *source
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { bun install --frozen-lockfile &&
        bun run format --write=false --check
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/check-vue3-format.log
        exit $$(cat /tmp/.ec)

  check-vue3-lint:
    image: oven/bun:1.3-alpine
    profiles: [lint]
    working_dir: /build/component/frontend
    volumes: *source
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { bun install --frozen-lockfile &&
        bun run lint
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/check-vue3-lint.log
        exit $$(cat /tmp/.ec)

  check-old-frontend:
    image: oven/bun:1.3-alpine
    profiles: [lint]
    working_dir: /build/old-frontend
    volumes: *source
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { bun install --frozen-lockfile &&
        bun run lint --no-fix --max-warnings 0
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/check-old-frontend.log
        exit $$(cat /tmp/.ec)

  check-protobuf:
    image: bufbuild/buf:1.44.0
    profiles: [lint]
    working_dir: /build
    volumes: *source
    entrypoint: [""]
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { buf lint &&
        buf breaking --against https://gitlab.com/isard/isardvdi.git
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/check-protobuf.log
        exit $$(cat /tmp/.ec)

  # ── fix (auto-fix linting issues) ────────────────────────────────────

  fix-python:
    image: python:3.10-bullseye
    profiles: [fix]
    working_dir: /build
    volumes: *source
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { pip install isort==5.13.2 black==24.3.0 &&
        isort . &&
        black .
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/fix-python.log
        exit $$(cat /tmp/.ec)

  fix-vue3-format:
    image: oven/bun:1.3-alpine
    profiles: [fix]
    working_dir: /build/component/frontend
    volumes: *source
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { bun install --frozen-lockfile &&
        bun run format
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/fix-vue3-format.log
        exit $$(cat /tmp/.ec)

  fix-vue3-lint:
    image: oven/bun:1.3-alpine
    profiles: [fix]
    working_dir: /build/component/frontend
    volumes: *source
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { bun install --frozen-lockfile &&
        bun run lint:fix
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/fix-vue3-lint.log
        exit $$(cat /tmp/.ec)

  fix-old-frontend:
    image: oven/bun:1.3-alpine
    profiles: [fix]
    working_dir: /build/old-frontend
    volumes: *source
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { bun install --frozen-lockfile &&
        bun run lint --fix
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/fix-old-frontend.log
        exit $$(cat /tmp/.ec)

  # ── generate ────────────────────────────────────────────────────────

  build-codegen:
    image: docker:23
    profiles: [generate]
    working_dir: /build
    volumes:
      - .:/build
      - ./ci-results:/ci-results
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CI_REGISTRY_IMAGE: ${CI_REGISTRY_IMAGE:-isardvdi}
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { docker build -f docker/codegen/Dockerfile -t $${CI_REGISTRY_IMAGE}/codegen:local .
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/build-codegen.log
        exit $$(cat /tmp/.ec)

  gen-protobuf:
    image: docker:23
    profiles: [generate]
    working_dir: /build
    volumes:
      - .:/build
      - ./ci-results:/ci-results
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      build-codegen:
        condition: service_completed_successfully
    environment:
      CI_REGISTRY_IMAGE: ${CI_REGISTRY_IMAGE:-isardvdi}
      BUF_TOKEN: ${BUF_TOKEN:-}
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { docker run --rm -u $$(id -u) -v "$$(pwd):/build" -e BUF_TOKEN="$$BUF_TOKEN" "$${CI_REGISTRY_IMAGE}/codegen:local"
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/gen-protobuf.log
        exit $$(cat /tmp/.ec)

  gen-docker-compose:
    image: docker:23
    profiles: [generate]
    working_dir: /build
    volumes:
      - .:/build
      - ./ci-results:/ci-results
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CI_REGISTRY_IMAGE: ${CI_REGISTRY_IMAGE:-isardvdi}
      CI_COMMIT_REF_SLUG: ${CI_COMMIT_REF_SLUG:-local}
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { apk add bash git docker-compose yq &&
        cp isardvdi.cfg.example isardvdi.build.cfg &&
        echo "DOCKER_IMAGE_PREFIX=$${CI_REGISTRY_IMAGE}/" >> isardvdi.build.cfg &&
        echo "DOCKER_IMAGE_TAG=$${CI_COMMIT_REF_SLUG}" >> isardvdi.build.cfg &&
        echo "USAGE=build" >> isardvdi.build.cfg &&
        echo "BASTION_ENABLED=true" >> isardvdi.build.cfg &&
        echo "ENABLE_OPENAPI=true" >> isardvdi.build.cfg &&
        cp isardvdi.build.cfg isardvdi.infrastructure.build.cfg &&
        echo "INFRASTRUCTURE_MANAGEMENT=true" >> isardvdi.infrastructure.build.cfg &&
        cp isardvdi.build.cfg isardvdi.video-standalone.build.cfg &&
        echo "FLAVOUR=video-standalone" >> isardvdi.video-standalone.build.cfg &&
        cp isardvdi.build.cfg isardvdi.monitor.build.cfg &&
        echo "FLAVOUR=monitor" >> isardvdi.monitor.build.cfg &&
        cp isardvdi.build.cfg isardvdi.check.build.cfg &&
        echo "FLAVOUR=check" >> isardvdi.check.build.cfg &&
        BACKUP_DB_ENABLED=true CODEGEN=false ./build.sh
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/gen-docker-compose.log
        exit $$(cat /tmp/.ec)

  # ── unit-test ───────────────────────────────────────────────────────

  unit-test-go:
    image: golang:1.25.8
    profiles: [unit-test]
    working_dir: /build
    volumes: *source
    environment:
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=
      - no_proxy=
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { apt-get update && apt-get install -y libvirt-dev &&
        go install gotest.tools/gotestsum@latest &&
        export PATH=$$PATH:~/go/bin &&
        gotestsum --junitfile /ci-results/unit-test-go.xml --format testname -- -race ./... -coverprofile /tmp/coverage.out -covermode atomic &&
        go tool cover -func /tmp/coverage.out
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/unit-test-go.log
        exit $$(cat /tmp/.ec)

  unit-test-apiv4:
    image: python:3.13-slim
    profiles: [unit-test]
    working_dir: /app
    volumes: *source
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { cp -r /build/component/apiv4/src/* /app/ 2>/dev/null; cp -r /build/component/apiv4/src/. /app/ &&
        cp /build/component/apiv4/docker/requirements.txt /app/requirements.txt &&
        echo "" >> /app/requirements.txt &&
        cat /build/component/apiv4/docker/test.requirements.txt >> /app/requirements.txt &&
        mkdir -p /opt/isardvdi &&
        cp -r /build/component/_common/isardvdi_common /opt/isardvdi/isardvdi_common &&
        cp -r /build/pkg/gen/proto/python /opt/isardvdi/isardvdi_protobuf &&
        apt-get update && apt-get install -y git &&
        pip install --no-cache-dir -r /app/requirements.txt --break-system-package &&
        set -a && . /build/isardvdi.cfg.example && set +a &&
        export PYTHONPATH=$$PYTHONPATH:/opt/isardvdi:/opt/isardvdi/isardvdi_protobuf &&
        pytest --cov=. --cov-report=term -q -n auto --dist=loadfile
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/unit-test-apiv4.log
        exit $$(cat /tmp/.ec)

  check-codegen-freshness:
    image: alpine:3.20
    profiles: [unit-test]
    working_dir: /build
    volumes: *source
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { apk add --no-cache git &&
        git config --global --add safe.directory /build &&
        echo "Checking if generated code matches committed code..." &&
        git diff --exit-code -- pkg/gen pkg/oas/apiv4 component/frontend/src/gen '**/testing_*_mock.go' || {
          echo ""
          echo "ERROR: Generated code is out of date."
          echo "Run the codegen container locally and commit the result:"
          echo "  docker run -v \$$(pwd):/build <codegen-image>"
          echo ""
          exit 1
        } &&
        echo "Generated code is up to date."
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/check-codegen-freshness.log
        exit $$(cat /tmp/.ec)

  # ── build ───────────────────────────────────────────────────────────

  docker-image-build:
    image: docker:23
    profiles: [build]
    working_dir: /build
    volumes:
      - .:/build
      - ./ci-results:/ci-results
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CI_REGISTRY_IMAGE: ${CI_REGISTRY_IMAGE:-isardvdi}
      CI_COMMIT_REF_SLUG: ${CI_COMMIT_REF_SLUG:-local}
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { apk add git docker-compose &&
        git submodule update --init --recursive --remote &&
        docker compose -f docker-compose.build.yml build
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/docker-image-build.log
        exit $$(cat /tmp/.ec)

  # ── scan ────────────────────────────────────────────────────────────

  container-scan:
    image: aquasec/trivy:latest
    profiles: [scan]
    volumes:
      - ./ci-results:/ci-results
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CI_REGISTRY_IMAGE: ${CI_REGISTRY_IMAGE:-isardvdi}
      CI_COMMIT_REF_SLUG: ${CI_COMMIT_REF_SLUG:-local}
    entrypoint: [""]
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { for IMAGE in apiv4 scheduler authentication backupninja bastion changefeed change-handler core_worker db engine grafana guac hypervisor notifier openapi portal sessions socketio squid static stats-go stats-rethinkdb storage webapp websockify; do
          echo "=== Scanning $$IMAGE ==="
          trivy image --severity HIGH,CRITICAL "$$CI_REGISTRY_IMAGE/$$IMAGE:$$CI_COMMIT_REF_SLUG" || true
        done
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/container-scan.log
        exit $$(cat /tmp/.ec)

  # ── integration-test ────────────────────────────────────────────────

  integration-test-apiv4:
    image: python:3.13-slim
    profiles: [integration-test]
    working_dir: /app
    volumes: *source
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results
        { apt update && apt install -y git &&
        cp -r /build/component/apiv4/src/. /app/ &&
        cp /build/component/apiv4/docker/requirements.txt /app/requirements.txt &&
        echo "" >> /app/requirements.txt &&
        cat /build/component/apiv4/docker/test.requirements.txt >> /app/requirements.txt &&
        mkdir -p /opt/isardvdi &&
        cp -r /build/component/_common/isardvdi_common /opt/isardvdi/isardvdi_common &&
        cp -r /build/pkg/gen/proto/python /opt/isardvdi/isardvdi_protobuf &&
        pip install --no-cache-dir -r /app/requirements.txt --break-system-package &&
        set -a && . /build/isardvdi.cfg.example && set +a &&
        export PYTHONPATH=$$PYTHONPATH:/opt/isardvdi:/opt/isardvdi/isardvdi_protobuf &&
        pytest --cov=. --cov-report=term-missing -v --tb=short --junitxml=/ci-results/integration-test-apiv4.xml
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/integration-test-apiv4.log
        exit $$(cat /tmp/.ec)

  integration-test-change-handler:
    image: python:3.13-slim
    profiles: [integration-test]
    working_dir: /build/component/change-handler/src
    volumes: *source
    environment:
      # Mirror the change-handler runtime container
      # (component/change-handler/docker/Dockerfile): protobuf for the
      # gRPC clients + asyncapi_changefeed for the typed ``changefeed_models``
      # and ``changefeed_subscribers`` modules imported by the handlers
      # and the FakeRow parity smoke tests.
      PYTHONPATH: /opt/isardvdi:/opt/isardvdi/isardvdi_protobuf:/opt/isardvdi/asyncapi_changefeed
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results /opt/isardvdi
        { cp -r /build/component/_common/isardvdi_common /opt/isardvdi/isardvdi_common &&
        cp -r /build/pkg/gen/proto/python /opt/isardvdi/isardvdi_protobuf &&
        cp -r /build/pkg/gen/asyncapi/changefeed /opt/isardvdi/asyncapi_changefeed &&
        pip install --no-cache-dir pytest pytest-asyncio &&
        pip install --no-cache-dir -r /build/component/change-handler/docker/requirements.txt &&
        pytest tests/ -v --tb=short --junitxml=/ci-results/integration-test-change-handler.xml
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/integration-test-change-handler.log
        exit $$(cat /tmp/.ec)

  integration-test-changefeed:
    image: python:3.13-slim
    profiles: [integration-test]
    working_dir: /build/component/changefeed/src
    volumes: *source
    environment:
      # changefeed imports from isardvdi_common — mirror the change-handler
      # PYTHONPATH layout so `from isardvdi_common.connections...` resolves.
      PYTHONPATH: /opt/isardvdi:/opt/isardvdi/isardvdi_protobuf:/build/component/changefeed/src
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results /opt/isardvdi
        { cp -r /build/component/_common/isardvdi_common /opt/isardvdi/isardvdi_common &&
        cp -r /build/pkg/gen/proto/python /opt/isardvdi/isardvdi_protobuf &&
        pip install --no-cache-dir pytest pytest-asyncio &&
        pip install --no-cache-dir -r /build/component/changefeed/docker/requirements.txt &&
        pytest tests/ -v --tb=short --junitxml=/ci-results/integration-test-changefeed.xml
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/integration-test-changefeed.log
        exit $$(cat /tmp/.ec)

  integration-test-common:
    image: python:3.13-slim
    profiles: [integration-test]
    working_dir: /opt/isardvdi
    volumes: *source
    environment:
      PYTHONPATH: /opt/isardvdi:/opt/isardvdi/isardvdi_protobuf
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results /opt/isardvdi
        { cp -r /build/component/_common/isardvdi_common /opt/isardvdi/isardvdi_common &&
        cp -r /build/pkg/gen/proto/python /opt/isardvdi/isardvdi_protobuf &&
        pip install --no-cache-dir pytest pytest-asyncio &&
        pip install --no-cache-dir -r /build/component/change-handler/docker/requirements.txt &&
        pip install --no-cache-dir -r /build/component/socketio/docker/requirements.txt &&
        # isardvdi_common/lib transitively pulls in apiv4's deps
        # (portion for interval math, html-sanitizer for notification
        # templates, etc.). Install apiv4's requirements so the full
        # module-load graph resolves without duplicating the pin list.
        pip install --no-cache-dir -r /build/component/apiv4/docker/requirements.txt &&
        pytest isardvdi_common -v --tb=short --junitxml=/ci-results/integration-test-common.xml
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/integration-test-common.log
        exit $$(cat /tmp/.ec)

  integration-test-engine:
    # The engine imports libvirt + pci + paramiko at module load time
    # (see engine/docker/Dockerfile + requirements.txt), so the test
    # runner must share the engine's runtime image. Re-tag or override
    # ENGINE_IMAGE via env if the registry path changes.
    image: ${ENGINE_IMAGE:-192.168.1.25:5001/isard/isardvdi/engine:apiv4-integration}
    profiles: [integration-test]
    working_dir: /isard
    volumes: *source
    environment:
      # engine tests under ``engine/services/threads`` import typed
      # ``changefeed_models`` from pkg/gen/asyncapi/changefeed — mirror
      # the change-handler layout so collection succeeds.
      PYTHONPATH: /isard:/opt/isardvdi:/opt/isardvdi/asyncapi_changefeed
    command:
      - sh
      - -c
      - |
        mkdir -p /ci-results /opt/isardvdi
        { cp -r /build/component/_common/isardvdi_common /opt/isardvdi/isardvdi_common &&
        cp -r /build/pkg/gen/asyncapi/changefeed /opt/isardvdi/asyncapi_changefeed &&
        cp -r /build/engine/engine/. /isard/ &&
        pip install --no-cache-dir --break-system-packages pytest &&
        pytest engine/models engine/services/threads -v --tb=short --junitxml=/ci-results/integration-test-engine.xml
        echo $$? > /tmp/.ec; } 2>&1 | tee /ci-results/integration-test-engine.log
        exit $$(cat /tmp/.ec)
