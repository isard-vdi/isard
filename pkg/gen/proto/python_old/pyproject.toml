[project]
name = "isardvdi-protobuf-old"
version = "0.0.0"
requires-python = ">=3.13,<3.14"
dependencies = [
  "betterproto==2.0.0b7",
  "grpclib==0.4.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/isardvdi_protobuf_old"]

[tool.isardvdi.system-deps]
apk-build = ["build-base", "libffi-dev", "musl-dev", "openssl-dev"]
apk-runtime = ["libffi", "openssl"]
