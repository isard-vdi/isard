[project]
name = "isardvdi-changefeed-asyncapi"
version = "0.0.0"
requires-python = ">=3.13,<3.14"
# pydantic comes from the @asyncapi/cli `--pyDantic` generator output
dependencies = [
  "pydantic>=2.0,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["changefeed_models", "changefeed_subscribers"]
