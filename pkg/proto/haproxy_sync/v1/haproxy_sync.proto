syntax = "proto3";

package haproxy_sync.v1;

// HaproxySyncService manages HAProxy syncronization
// with new configuration, avoiding full HAProxy reloads
service HaproxySyncService {
  // BastionAddSubdomain adds a subdomain to subdomains.map
  rpc BastionAddSubdomain(BastionAddSubdomainRequest) returns (BastionAddSubdomainResponse) {}

  // BastionDeleteSubdomain removes a subdomain from subdomains.map
  rpc BastionDeleteSubdomain(BastionDeleteSubdomainRequest) returns (BastionDeleteSubdomainResponse) {}

  // BastionAddIndividualDomain adds a domain to individual.map
  rpc BastionAddIndividualDomain(BastionAddIndividualDomainRequest) returns (BastionAddIndividualDomainResponse) {}

  // BastionDeleteIndividualDomain removes a domain from individual.map
  rpc BastionDeleteIndividualDomain(BastionDeleteIndividualDomainRequest) returns (BastionDeleteIndividualDomainResponse) {}

  // BastionSyncMaps performs full synchronization of all maps
  rpc BastionSyncMaps(BastionSyncMapsRequest) returns (BastionSyncMapsResponse) {}

  // BastionGetCurrentMaps returns current HAProxy map state
  rpc BastionGetCurrentMaps(BastionGetCurrentMapsRequest) returns (BastionGetCurrentMapsResponse) {}
}

message BastionAddSubdomainRequest {
  string domain = 1;
}

message BastionAddSubdomainResponse {}

message BastionDeleteSubdomainRequest {
  string domain = 1;
}

message BastionDeleteSubdomainResponse {}

message BastionAddIndividualDomainRequest {
  string domain = 1;
}

message BastionAddIndividualDomainResponse {}

message BastionDeleteIndividualDomainRequest {
  string domain = 1;
}

message BastionDeleteIndividualDomainResponse {}

message BastionSyncMapsRequest {
  repeated string subdomains = 1;
  repeated string individual_domains = 2;
}

message BastionSyncMapsResponse {
  int32 subdomains_added = 1;
  int32 subdomains_removed = 2;
  int32 individual_added = 3;
  int32 individual_removed = 4;
}

message BastionGetCurrentMapsRequest {}

message BastionGetCurrentMapsResponse {
  repeated string subdomains = 1;
  repeated string individual_domains = 2;
}
