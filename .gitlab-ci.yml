spec:
  inputs:
    use-image-build-cache:
      type: boolean
      default: true
    allow-protobuf-lint-failure:
      type: boolean
      default: false
---
# https://docs.gitlab.com/ee/ci/yaml/index.html#switch-between-branch-pipelines-and-merge-request-pipelines
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS || $CI_COMMIT_TAG
      when: never
    - when: always

# https://docs.gitlab.com/ee/ci/docker/using_docker_build.html#use-docker-in-docker
variables:
  # When you use the dind service, you must instruct Docker to talk with
  # the daemon started inside of the service. The daemon is available
  # with a network connection instead of the default
  # /var/run/docker.sock socket. Docker 19.03 does this automatically
  # by setting the DOCKER_HOST in
  # https://github.com/docker-library/docker/blob/d45051476babc297257df490d22cbd806f1b11e4/19.03/docker-entrypoint.sh#L23-L29
  #
  # The 'docker' hostname is the alias of the service container as described at
  # https://docs.gitlab.com/ee/ci/services/#accessing-the-services.
  #
  # Specify to Docker where to create the certificates. Docker
  # creates them automatically on boot, and creates
  # `/certs/client` to share between the service and job
  # container, thanks to volume mount from config.toml
  DOCKER_HOST: tcp://docker:2376
  DOCKER_VERSION: "28"
  DOCKER_TLS_CERTDIR: "/certs"
  GITLAB_ADVANCED_SAST_ENABLED: "true"
  MAX_UNVERIFIED_CORES: "16"
  # Cache bun's content-addressed global install store (hash-verified, self-healing)
  # instead of the derived node_modules tree. A corrupt or truncated file inside a
  # cached node_modules (e.g. a 0-byte dependency file) otherwise persists across
  # pipelines forever, because the cache key is the lockfile hash and
  # `bun install --frozen-lockfile` reuses the restored tree without per-file
  # integrity checks. Caching the global store lets bun detect a bad entry by hash
  # and refetch it, rebuilding node_modules fresh each run.
  BUN_INSTALL_CACHE_DIR: "$CI_PROJECT_DIR/.bun-cache"
  # Secret Detection scans third-party Go module testdata fixtures (RSA/SSH keys,
  # AWS sample IDs, etc.) inside .go-mod-cache as critical findings. Those are
  # not project secrets — they ship inside dependency tarballs. Excluding the
  # dependency caches keeps the report focused on this repo's own code.
  SECRET_DETECTION_EXCLUDED_PATHS: ".go-mod-cache,vendor,node_modules,old-frontend/node_modules,component/frontend/node_modules,testing/e2e/node_modules"

default:
  retry: 1
  cache: &global_cache
    - key:
        files:
          - go.mod
          - go.sum
      paths:
        - /go/pkg/mod
        - .cache/go-build
    - key:
        files:
          - component/frontend/bun.lockb
          - old-frontend/bun.lock
      paths:
        - .bun-cache
    - key:
        files:
          - testing/e2e/package.json
          - testing/e2e/yarn.lock
      paths:
        - testing/e2e/node_modules
    - key:
        files:
          - uv.lock
      paths:
        - .uv-cache

include:
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml

stages:
  - lint
  - build-codegen
  - generate
  - unit-test
  - build
  - build-no-cache
  - test
  - release
  - container-scan

commit-lint:
  stage: lint
  image: node:lts
  before_script:
    - npm install -g commitlint@19.2.2 @commitlint/config-conventional@19.2.2
  script:
    - git fetch https://gitlab.com/isard/isardvdi.git main
    - commitlint --from=$(git merge-base HEAD FETCH_HEAD)

version:
  stage: lint
  image: node:lts
  rules:
    # semantic-release checks repository write access and we cannot use
    # GITLAB_TOKEN in unprotected branches due to security reasons.
    # https://github.com/semantic-release/semantic-release/issues/2207
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - npm install -g semantic-release@23 @semantic-release/exec @semantic-release/gitlab conventional-changelog-conventionalcommits@6
  script:
    - semantic-release --dry-run --branches $CI_COMMIT_REF_NAME
  artifacts:
    paths:
      - .VERSION

check-alloy-config:
  stage: lint
  image: alpine
  before_script:
    - apk add --no-cache alloy make
  script:
    - make lint-alloy

.lint-uv-job:
  stage: lint
  image: ghcr.io/astral-sh/uv:0.11.23-python3.13-alpine
  before_script:
    - apk add --no-cache make
    - uv sync --only-group dev

check-python:
  extends: .lint-uv-job
  script:
    - make lint-python

check-system-deps:
  extends: .lint-uv-job
  script:
    - make lint-system-deps

check-golang:
  stage: lint
  image: golangci/golangci-lint
  script:
    - make lint-go

check-frontend:
  stage: lint
  image: oven/bun:1.3-alpine
  parallel:
    matrix:
      - JOB: "format"
      - JOB: "lint"
      # - JOB: "type-check"
      #   # TODO: Remove this when all type errors are fixed
      #   ALLOW_FAILURE: "true"
  rules:
    - if: $ALLOW_FAILURE == "true"
      allow_failure: true
    - if: $ALLOW_FAILURE != "true"
      allow_failure: false
  before_script:
    - apk add --no-cache make
  script:
    - make lint-frontend-$JOB

check-old-frontend:
  stage: lint
  image: oven/bun:1.3-alpine
  before_script:
    - apk add --no-cache make
  script:
    - make lint-old-frontend

check-protobuf:
  stage: lint
  image:
    name: bufbuild/buf:1.44.0
    entrypoint: [""]
  allow_failure: $[[ inputs.allow-protobuf-lint-failure ]]
  # bufbuild/buf image is distroless — no package manager to install make.
  # Keep invocation inline; commands match `make lint-protobuf`.
  script:
    - buf lint
    - buf breaking --against https://gitlab.com/isard/isardvdi.git

docker-image-codegen:
  image: "docker:${DOCKER_VERSION}"
  stage: build-codegen
  services:
    - name: "docker:${DOCKER_VERSION}-dind-rootless"
  parallel:
    matrix:
      - DOCKERFILE: docker/codegen/Dockerfile
        IMAGE: codegen
  before_script:
    - timeout 300 sh -c 'until docker info >/dev/null 2>&1; do sleep 2; done'
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - |
      if $[[ inputs.use-image-build-cache ]]
      then
        CACHE_ARGS="--cache-from registry.gitlab.com/isard/isardvdi/$IMAGE:main --cache-to type=inline"
        if [ -n "$BUILDKIT_CACHE_REGISTRY" ]; then
          CACHE_ARGS="--cache-from $BUILDKIT_CACHE_REGISTRY/isard/isardvdi/$IMAGE:latest $CACHE_ARGS"
        fi
        docker build -f $DOCKERFILE $CACHE_ARGS -t $CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_REF_SLUG .
      else
        docker build -f $DOCKERFILE -t $CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_REF_SLUG .
      fi
    - docker tag $CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_REF_SLUG $CI_REGISTRY_IMAGE/$IMAGE:git-$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/$IMAGE:git-$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_REF_SLUG
    - docker tag $CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_REF_SLUG $BUILDKIT_CACHE_REGISTRY/isard/isardvdi/$IMAGE:latest || true
    - docker push $BUILDKIT_CACHE_REGISTRY/isard/isardvdi/$IMAGE:latest || true

gen-protobuf:
  stage: generate
  image: "docker:${DOCKER_VERSION}"
  services:
    - name: "docker:${DOCKER_VERSION}-dind-rootless"
  before_script:
    - timeout 300 sh -c 'until docker info >/dev/null 2>&1; do sleep 2; done'
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker run -u $(id -u) -v "$(pwd):/build" "$CI_REGISTRY_IMAGE/codegen:git-$CI_COMMIT_SHORT_SHA"
  artifacts:
    paths:
      - pkg/gen
      - component/frontend/src/gen
      - testing/e2e/src/gen
      - "**/testing_*_mock.go"
      # openapi-python-client output. Each client's src/<pkg>/__init__.py is
      # tracked but the rest of the tree (client.py, errors.py, types.py,
      # api/, models/) is gitignored — codegen regenerates it. Without
      # propagating these paths the downstream unit-test-apiv4 /
      # unit-test-webapp jobs see only __init__.py whose first line is
      # `from .client import …`, which raises ModuleNotFoundError at import.
      - component/_common/isardvdi_apiv4_client/src/isardvdi_apiv4_client
      - component/_common/isardvdi_authentication_client/src/isardvdi_authentication_client
      - component/_common/isardvdi_notifier_client/src/isardvdi_notifier_client
      - component/_common/isardvdi_scheduler_client/src/isardvdi_scheduler_client

docker-compose-build:
  stage: generate
  needs: []
  image: "docker:${DOCKER_VERSION}"
  services:
    - name: "docker:${DOCKER_VERSION}-dind-rootless"
  before_script:
    - apk add bash git docker-compose yq
  script:
    - cp isardvdi.cfg.example isardvdi.build.cfg
    - echo "DOCKER_IMAGE_PREFIX=${CI_REGISTRY_IMAGE}/" >> isardvdi.build.cfg
    - echo "DOCKER_IMAGE_TAG=$CI_COMMIT_REF_SLUG" >> isardvdi.build.cfg
    - echo "USAGE=build" >> isardvdi.build.cfg
    - echo "BASTION_ENABLED=true" >> isardvdi.build.cfg
    - echo "ENABLE_OPENAPI=true" >> isardvdi.build.cfg
    - cp isardvdi.build.cfg isardvdi.infrastructure.build.cfg
    - echo "INFRASTRUCTURE_MANAGEMENT=true" >> isardvdi.infrastructure.build.cfg
    - cp isardvdi.build.cfg isardvdi.video-standalone.build.cfg
    - echo "FLAVOUR=video-standalone" >> isardvdi.video-standalone.build.cfg
    - cp isardvdi.build.cfg isardvdi.monitor.build.cfg
    - echo "FLAVOUR=monitor" >> isardvdi.monitor.build.cfg
    - cp isardvdi.build.cfg isardvdi.check.build.cfg
    - echo "FLAVOUR=check" >> isardvdi.check.build.cfg
    - BACKUP_DB_ENABLED=true CODEGEN=false ./build.sh
    - |-
      # Cache from the branch we are merging into (apiv4-integration today, main
      # after the apiv4->main cutover — self-adjusting), with :main as fallback.
      CACHE_REF="${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-${CI_COMMIT_REF_SLUG:-main}}"
      for file in docker-compose*.yml; do
        cp "$file" "no-cache-$file"
        if [ -n "$BUILDKIT_CACHE_REGISTRY" ]; then
          yq -i '.services |= map_values(.build.cache_from = [ "'"$BUILDKIT_CACHE_REGISTRY"'/isard/isardvdi/" + (.container_name | sub("isard-", "")) + ":latest", "registry.gitlab.com/isard/isardvdi/" + (.container_name | sub("isard-", "")) + ":'"$CACHE_REF"'", "registry.gitlab.com/isard/isardvdi/" + (.container_name | sub("isard-", "")) + ":main" ]) |= map_values(.build.cache_to = [ "type=inline" ])' $file
        else
          yq -i '.services |= map_values(.build.cache_from = [ "registry.gitlab.com/isard/isardvdi/" + (.container_name | sub("isard-", "")) + ":'"$CACHE_REF"'", "registry.gitlab.com/isard/isardvdi/" + (.container_name | sub("isard-", "")) + ":main" ]) |= map_values(.build.cache_to = [ "type=inline" ])' $file
        fi
      done
  artifacts:
    paths:
      - docker-compose*.yml
      - no-cache-docker-compose*.yml

unit-test-go:
  stage: unit-test
  needs: ["gen-protobuf"]
  image: golang:1.25.8
  variables:
    GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
  before_script:
    - apt-get update && apt-get install -y libvirt-dev make
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
    - export PATH=$PATH:~/go/bin
  script:
    - make ci-test-go
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: report.xml
  coverage: /total:\s+\(statements\)\s+\d+.\d+%/

# Shared Python test config — uv cache dir cached via default cache entry.
.python-test-base:
  stage: unit-test
  needs: ["gen-protobuf"]
  image: ghcr.io/astral-sh/uv:0.11.23-python3.13-alpine
  variables:
    UV_CACHE_DIR: "${CI_PROJECT_DIR}/.uv-cache"
  before_script:
    - apk add --no-cache git make

.python-test-job:
  extends: .python-test-base
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: ${COVERAGE_DIR}/coverage.xml
      junit: ${COVERAGE_DIR}/report.xml
  coverage: '/TOTAL\s+\d+\s+\d+\s+\d+%/'

unit-test-apiv4:
  extends: .python-test-job
  variables:
    COVERAGE_DIR: component/apiv4/src
    USAGE: "production"
  script:
    - make ci-test-apiv4

unit-test-change-handler:
  extends: .python-test-job
  variables:
    COVERAGE_DIR: component/change-handler/src
  script:
    - make ci-test-change-handler

unit-test-changefeed:
  extends: .python-test-job
  variables:
    COVERAGE_DIR: component/changefeed/src
  script:
    - make ci-test-changefeed

unit-test-webapp:
  extends: .python-test-job
  variables:
    COVERAGE_DIR: webapp/webapp
    USAGE: "test"
    API_ISARDVDI_SECRET: "ci-test-secret"
  script:
    - make ci-test-webapp

unit-test-common:
  extends: .python-test-job
  variables:
    COVERAGE_DIR: component/_common/src
  script:
    - make ci-test-common

unit-test-hypervisor-lib:
  # Hypervisor GPU lib suites. Dependency-free
  # pytest: the shared gpu modules load from
  # component/_common/src/isardvdi_common/lib via gpu_probe._load_shared.
  extends: .python-test-base
  stage: unit-test
  script:
    - make ci-test-hypervisor-lib
  artifacts:
    when: always
    reports:
      junit: docker/hypervisor/src/lib/report.xml

unit-test-hypervisor-ovs:
  # OVS worker flow-generation suite for the per-interface lab_opts feature
  # Pure-stdlib pytest: ovs-worker.py is loaded via importlib and
  # subprocess.run is monkeypatched, so no OVS bridge, root, or extra runtime
  # deps are needed. The engine domain_xml lab_opts test rides unit-test-engine
  # and the apiv4 validation test rides unit-test-apiv4; this closes the last
  # gap (docker/hypervisor/src/ovs is not covered by unit-test-hypervisor-lib).
  extends: .python-test-base
  stage: unit-test
  script:
    - make ci-test-hypervisor-ovs
  artifacts:
    when: always
    reports:
      junit: docker/hypervisor/src/ovs/report.xml

check-codegen-freshness:
  # Catches commits that modify ``pkg/oas/apiv4/*.json`` / ``.proto`` /
  # SDK interfaces without regenerating the tracked mocks. ``pkg/gen/**``
  # and ``component/frontend/src/gen/**`` are gitignored so they do not
  # participate, but ``pkg/sdk/testing_*_mock.go`` IS tracked and must
  # be kept current. The ``gen-protobuf`` job produces fresh artifacts;
  # we compare them to what was committed.
  stage: unit-test
  needs: ["gen-protobuf"]
  image: alpine:3.20
  before_script:
    - apk add --no-cache git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - |-
      if ! git diff --exit-code -- '**/testing_*_mock.go' pkg/oas; then
        echo ""
        echo "ERROR: Generated code is out of date."
        echo "Re-run codegen locally (bash build.sh with CODEGEN unset)"
        echo "and commit the regenerated mocks + oas."
        exit 1
      fi
    - echo "Generated code is up to date."

unit-test-socketio:
  extends: .python-test-job
  variables:
    COVERAGE_DIR: component/socketio/src
  script:
    - make ci-test-socketio

unit-test-openapi:
  extends: .python-test-job
  variables:
    COVERAGE_DIR: component/openapi/src
  script:
    - make ci-test-openapi

unit-test-notifier:
  extends: .python-test-job
  variables:
    COVERAGE_DIR: notifier
  script:
    - make ci-test-notifier

unit-test-scheduler:
  extends: .python-test-job
  variables:
    COVERAGE_DIR: scheduler
  script:
    - make ci-test-scheduler

docker-image:
  image: "docker:${DOCKER_VERSION}"
  stage: build
  needs:
    - docker-compose-build
    - gen-protobuf
  services:
    - name: "docker:${DOCKER_VERSION}-dind-rootless"
  parallel:
    matrix:
      - DOCKER_COMPOSE: build
        IMAGE: &containers
          - apiv4
          - changefeed
          - change-handler
          - scheduler
          - authentication
          - backupninja
          - bastion
          - db
          - engine
          - grafana
          - guac
          - hypervisor
          - notifier
          - openapi
          - sessions
          - socketio
          - squid
          - static
          - stats-go
          - stats-rethinkdb
          - storage
          - webapp
          - websockify
      - DOCKER_COMPOSE: build
        IMAGE: vpn
      - DOCKER_COMPOSE: build
        IMAGE: portal
      - DOCKER_COMPOSE: infrastructure.build
        IMAGE: orchestrator
      - DOCKER_COMPOSE: video-standalone.build
        IMAGE: video
      - DOCKER_COMPOSE: monitor.build
        IMAGE: monitor-proxy
      - DOCKER_COMPOSE: check.build
        IMAGE:
          - check
          - check-client
  before_script:
    - apk add git docker-compose
    - timeout 300 sh -c 'until docker info >/dev/null 2>&1; do sleep 2; done'
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - git submodule update --init --recursive --remote
    - |
      if $[[ inputs.use-image-build-cache ]]
      then
        DOCKERCOMPOSE_FILE=docker-compose.$DOCKER_COMPOSE.yml
      else
        DOCKERCOMPOSE_FILE=no-cache-docker-compose.$DOCKER_COMPOSE.yml
      fi
    - echo $IMAGE_DEPENDENCY isard-$IMAGE | xargs -n1 docker-compose -f $DOCKERCOMPOSE_FILE build
    - docker tag $CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_REF_SLUG $CI_REGISTRY_IMAGE/$IMAGE:git-$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/$IMAGE:git-$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_REF_SLUG
    - |
      if [ -n "$BUILDKIT_CACHE_REGISTRY" ]; then
        docker tag $CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_REF_SLUG $BUILDKIT_CACHE_REGISTRY/isard/isardvdi/$IMAGE:latest
        docker push $BUILDKIT_CACHE_REGISTRY/isard/isardvdi/$IMAGE:latest
      fi

unit-test-engine:
  # Engine tests under ``engine/services/threads`` and ``engine/models``
  # import libvirt + paramiko + ``changefeed_models`` at module load,
  # so running them in a generic python image is impractical. Re-use
  # the freshly-built engine image as the runner — it already has the
  # full runtime (libvirt-dev, paramiko, ``/opt/isardvdi/asyncapi_changefeed``
  # on PYTHONPATH). Overlay the source tree via ``docker cp`` into
  # ``/isard`` and pytest against it.
  stage: test
  needs: ["docker-image", "gen-protobuf"]
  image: "docker:${DOCKER_VERSION}"
  services:
    - name: "docker:${DOCKER_VERSION}-dind-rootless"
      alias: docker
  before_script:
    - apk add bash git
    - timeout 300 sh -c 'until docker info >/dev/null 2>&1; do sleep 2; done'
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - ENGINE_IMAGE="$CI_REGISTRY_IMAGE/engine:git-$CI_COMMIT_SHORT_SHA"
    - docker pull "$ENGINE_IMAGE"
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/build:ro" \
        -w /isard \
        "$ENGINE_IMAGE" \
        sh -c '
          set -e
          mkdir -p /ci-results
          cp -r /build/engine/engine/. /isard/
          cp -r /build/component/_common/src/isardvdi_common /opt/isardvdi/isardvdi_common 2>/dev/null || true
          pytest engine/models engine/controllers engine/services/threads engine/services/lib initdb -q --tb=short --junitxml=/ci-results/report.xml
          # Separate invocation: engine/services/db needs importlib mode, since
          # prepend mode imports by dotted path and the conftest stubs the
          # engine.services.db package (its db.py connects to RethinkDB on import).
          pytest --import-mode=importlib engine/services/db -q --tb=short --junitxml=/ci-results/report-db.xml
        '
  artifacts:
    when: always
    reports:
      junit: /ci-results/*.xml

test-e2e:
  stage: test
  when: manual
  tags:
    - gpu
    - kvm
  needs: ["docker-image", "gen-protobuf"]
  timeout: 30m
  allow_failure: true
  variables:
    DOCKER_TLS_CERTDIR: "/certs-root"
  services:
    - name: "docker:${DOCKER_VERSION}-dind"
      variables:
        DOCKER_TLS_CERTDIR: "/certs-root"
      alias: docker
      entrypoint:
        - "sh"
        - "-c"
        - "apk add --no-cache fuse-overlayfs && exec dockerd-entrypoint.sh"
  image: "docker:${DOCKER_VERSION}"
  before_script:
    # Get dependencies:
    - |
      # git: build.sh
      # make: seeding the instance
      # libstdc++, libgcc: bun runtime
      apk add git make libstdc++ libgcc

    # Configure the instance
    - cp isardvdi.cfg.example isardvdi.e2e.cfg
    - cat testing/config/isardvdi.e2e.cfg.template >> isardvdi.e2e.cfg
    # CI-only vars appended by the runner
    - echo "DOCKER_IMAGE_PREFIX=${CI_REGISTRY_IMAGE}/" >> isardvdi.e2e.cfg
    - echo "DOCKER_IMAGE_TAG=git-$CI_COMMIT_SHORT_SHA" >> isardvdi.e2e.cfg
    - echo "FRONTEND_MODE=all" >> isardvdi.e2e.cfg
    # /dev/hugepages bind loses the hugetlbfs type through nested dind
    # layers; libvirtd's QEMU driver init aborts unless we point it at a
    # placeholder dir (the hypervisor never exercises hugepages in test).
    - mkdir -p /tmp/isard-real-hugepages
    - echo "HUGEPAGES_PATH=/tmp/isard-real-hugepages" >> isardvdi.e2e.cfg
    # Build the docker-compose file
    - CODEGEN=false ./build.sh
    # Start the instance
    - docker-compose -f docker-compose.e2e.yml pull --quiet
    - docker-compose -f docker-compose.e2e.yml up -d
    ## Download bun
    - docker create --name bun-bin oven/bun:1.3-alpine
    - docker cp bun-bin:/usr/local/bin/bun /usr/local/bin/bun
    - docker rm bun-bin
  script:
    - make test-e2e
  after_script:
    - docker-compose -f docker-compose.e2e.yml logs &> docker-compose.log
    # Playwright writes [[ATTACHMENT|<path>]] relative to junit.xml; GitLab
    # resolves them from CI_PROJECT_DIR, so prepend the dir prefix.
    - |
      if [ -f testing/e2e/test-results/junit.xml ]; then
        sed -i 's#\[\[ATTACHMENT|#\[\[ATTACHMENT|testing/e2e/test-results/#g' testing/e2e/test-results/junit.xml
      fi
  artifacts:
    when: always
    paths:
      - docker-compose.log
      - testing/e2e/test-results/
      - testing/e2e/playwright-report/
    reports:
      junit: testing/e2e/test-results/junit.xml

integration-real:
  # Runs the Python lifecycle suite (testing/integration/) against a
  # full dind-rootless stack. Uses the same docker-compose.e2e.yml the
  # Playwright job builds, so one stack serves both. Manual trigger +
  # allow_failure: we're still bedding in the TCG hypervisor path; any
  # intermittent archive.org outage shouldn't fail the pipeline.
  stage: test
  when: manual
  tags:
    - gpu
  needs: ["docker-image"]
  timeout: 20m
  allow_failure: true
  variables:
    DOCKER_TLS_CERTDIR: "/certs-root"
  services:
    - name: "docker:${DOCKER_VERSION}-dind-rootless"
      variables:
        DOCKER_TLS_CERTDIR: "/certs-root"
      alias: docker
  image: "docker:${DOCKER_VERSION}"
  before_script:
    - apk add bash git docker-compose python3 curl
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - timeout 300 sh -c 'until docker info >/dev/null 2>&1; do sleep 2; done'
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - cp isardvdi.cfg.example isardvdi.e2e.cfg
    - echo "USAGE=test" >> isardvdi.e2e.cfg
    - echo "DOMAIN=host.docker.internal" >> isardvdi.e2e.cfg
    - echo "DOCKER_IMAGE_PREFIX=${CI_REGISTRY_IMAGE}/" >> isardvdi.e2e.cfg
    - echo "DOCKER_IMAGE_TAG=git-$CI_COMMIT_SHORT_SHA" >> isardvdi.e2e.cfg
    - echo "ENABLE_STATS=false" >> isardvdi.e2e.cfg
    # FRONTEND_MODE=all keeps the Vue 3 SPA reachable for the e2e suite — the
    # cfg.example default is "deprecated" (Vue 3 redirects to Vue 2) for safe
    # production migrations, but every Vue 3 e2e spec navigates to /frontend/*
    # and would silently land on Vue 2 without this override.
    - echo "FRONTEND_MODE=all" >> isardvdi.e2e.cfg
    # Test runs MUST disable the login rate limiter — cfg.example enables it
    # (good for production), but serial/parallel test logins trip it and the
    # whole run cascades into 429 failures. testing/config/isardvdi.e2e.cfg.template
    # does the same for the test-e2e job.
    - echo "AUTHENTICATION_AUTHENTICATION_LIMITS_ENABLED=false" >> isardvdi.e2e.cfg
    # Redirect nvidia-smi / libnvidia-ml / sriov-manage mounts to an
    # always-present file — rootless dind cannot mkdir /usr/bin/nvidia-smi
    # or /usr/lib/nvidia/sriov-manage to satisfy the default bind. GPU
    # discovery exits cleanly when exec fails.
    - echo "NVIDIA_SMI_PATH=/etc/hostname" >> isardvdi.e2e.cfg
    - echo "NVIDIA_ML_LIB_PATH=/etc/hostname" >> isardvdi.e2e.cfg
    - echo "NVIDIA_SRIOV_MANAGE_PATH=/etc/hostname" >> isardvdi.e2e.cfg
    # /dev/hugepages mount: see test-e2e job comment.
    - mkdir -p /tmp/isard-real-hugepages
    - echo "HUGEPAGES_PATH=/tmp/isard-real-hugepages" >> isardvdi.e2e.cfg
    - CODEGEN=false ./build.sh
    - "sed -i 's|source: /opt/isard/|source: /tmp/isard-real/opt/isard/|g; s|source: /opt/isard-local/|source: /tmp/isard-real/opt/isard-local/|g' docker-compose.e2e.yml"
    - docker compose -f docker-compose.e2e.yml pull
    - docker compose -f docker-compose.e2e.yml up -d
    - uv sync --frozen --package isardvdi-testing --group test --no-editable
    - uv run --group test --package isardvdi-testing python3 testing/db/populate_test_db.py
  script:
    - |
      NETWORK_ID="$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.NetworkID}}{{end}}' isard-portal | tr -d '\n')"
      docker run --rm \
        --network="$NETWORK_ID" \
        -v "$(pwd):/src" -w /src/testing \
        -e E2E_ADMIN_USER=admin_e2e_01 \
        -e E2E_ADMIN_PWD='IsardTest1!' \
        -e E2E_SKIP_VM_BOOT=1 \
        ghcr.io/astral-sh/uv:0.11.23-python3.13-trixie-slim bash -c '
          apt-get update -qq && apt-get install -y -qq curl > /dev/null
          bash /src/testing/integration/wait-for-stack.sh 240
          cd /src && uv sync --frozen --package isardvdi-testing --group test --no-editable
          cd /src/testing && uv run --group test --package isardvdi-testing pytest integration/ -v -m real --tb=short --junitxml=/src/testing/integration/report.xml
        '
  after_script:
    - docker compose -f docker-compose.e2e.yml down || true
  artifacts:
    when: always
    reports:
      junit: testing/integration/report.xml

gemnasium-dependency_scanning:
  variables:
    # Scan all the subdirectories
    DS_MAX_DEPTH: -1
    DS_INCLUDE_DEV_DEPENDENCIES: "false"
    DS_REMEDIATE: "false"

docker-tag:
  stage: release
  image:
    name: gcr.io/go-containerregistry/crane:debug
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  parallel:
    matrix:
      - IMAGE: *containers
      - IMAGE: &containers_extra
          - codegen
          - check
          - check-client
          - vpn
          - orchestrator
          - portal
          - video
          - monitor-proxy
  script:
    - test ! -e ".VERSION" && exit 0
    - crane auth login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - crane tag $CI_REGISTRY_IMAGE/$IMAGE:git-$CI_COMMIT_SHORT_SHA v$(cat .VERSION | tr '.' '-')

release:
  stage: release
  image: node:lts
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - test ! -e ".VERSION" && exit 0
    - 'sed -i "s/^\(\s*DOCKER_IMAGE_TAG: \)$CI_DEFAULT_BRANCH$/\1v$(cat .VERSION | tr "." "-")/" docker-compose*.yml'
    - npm install -g semantic-release@23 @semantic-release/exec @semantic-release/gitlab conventional-changelog-conventionalcommits@6
    - semantic-release --branches $CI_DEFAULT_BRANCH

container_scanning:
  stage: container-scan
  needs:
    - job: docker-image
      artifacts: false
  variables:
    CI_APPLICATION_REPOSITORY: $CI_REGISTRY_IMAGE/$IMAGE
    CI_APPLICATION_TAG: $CI_COMMIT_REF_SLUG
  parallel:
    matrix:
      - IMAGE: *containers
      - IMAGE: *containers_extra
