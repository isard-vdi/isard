# IsardVDI Connection Tracking Optimization
# Apply on ALL host machines running any IsardVDI flavour (not inside containers)
#
# Installation:
#   cp 99-isardvdi-conntrack.conf /etc/sysctl.d/
#   sysctl -p /etc/sysctl.d/99-isardvdi-conntrack.conf
#
# Verify:
#   cat /proc/sys/net/netfilter/nf_conntrack_max
#   cat /proc/sys/net/netfilter/nf_conntrack_count

# Increase conntrack table size for large deployments
# Default 262144 is too low for servers handling 200+ VMs or tunnel traffic
net.netfilter.nf_conntrack_max = 2097152
net.nf_conntrack_max = 2097152

# Increase hash table buckets (should be ~1/4 of max)
net.netfilter.nf_conntrack_buckets = 524288

# Reduce TCP established timeout from 5 days to 6 hours
# Frees conntrack entries ~20x faster for dead/orphaned connections
# Safe because NOTRACK bypasses tunnel traffic (the bulk of flows) and
# remaining NATted connections (Docker, viewers) have app-level keepalives
net.netfilter.nf_conntrack_tcp_timeout_established = 21600

# Reduce TIME_WAIT timeout from 120s to 60s
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 60

# UDP timeouts for tunnel traffic (if not using NOTRACK)
net.netfilter.nf_conntrack_udp_timeout = 30
net.netfilter.nf_conntrack_udp_timeout_stream = 120
